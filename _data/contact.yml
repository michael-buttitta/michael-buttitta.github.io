#  The contact options shown in the sidebar.

- type: github
  icon: "fab fa-github"

- type: twitter
  icon: "fa-brands fa-x-twitter"

- type: email
  icon: "fas fa-envelope"
  noblank: true # open link in current tab

- type: rss
  icon: "fas fa-rss"
  noblank: true

- type: linkedin
  icon: "fab fa-linkedin" # icons powered by <https://fontawesome.com/>
  url: "https://www.linkedin.com/in/YOUR_LINKEDIN_SLUG" # TODO: replace with your real LinkedIn URL
