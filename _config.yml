# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the webpage › http://www.lingoes.net/en/translator/langcode.htm
lang: en

# Change to your timezone › https://zones.arilyn.cc
timezone: America/New_York

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Michael Buttitta # the main title

tagline: # OWNER: optional one-line subtitle shown under your name (left blank while you decide your direction)

description: >- # used by seo meta and the atom feed
  The personal website of Michael Buttitta.

# Fill in the protocol & hostname for your site.
url: "https://michael-buttitta.github.io"

github:
  username: michael-buttitta # change to your GitHub username

twitter:
  username: tarheel5252 # change to your Twitter username

social:
  # Displayed as the default post author and the copyright owner in the footer
  name: Michael Buttitta
  email: michaelbuttitta52@gmail.com
  fediverse_handle: # fill in your fediverse handle. E.g. "@username@domain.com"
  links:
    # The first element serves as the copyright owner's link
    - https://twitter.com/tarheel5252
    - https://github.com/michael-buttitta
    # TODO: replace with your real LinkedIn URL and uncomment:
    # - https://www.linkedin.com/in/YOUR_LINKEDIN_SLUG

# Site Verification Settings
webmaster_verifications:
  google: # fill in your Google verification code
  bing: # fill in your Bing verification code
  alexa: # fill in your Alexa verification code
  yandex: # fill in your Yandex verification code
  baidu: # fill in your Baidu verification code
  facebook: # fill in your Facebook verification code

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
# Left empty for launch. Privacy-first option: add a GoatCounter ID later.
analytics:
  google:
    id: # fill in your Google Analytics ID
  goatcounter:
    id: # fill in your GoatCounter ID (privacy-first, recommended)
  umami:
    id: # fill in your Umami ID
    domain: # fill in your Umami domain
  matomo:
    id: # fill in your Matomo ID
    domain: # fill in your Matomo domain
  cloudflare:
    id: # fill in your Cloudflare Web Analytics token
  fathom:
    id: # fill in your Fathom Site ID

# Page views settings
pageviews:
  provider: # now only supports 'goatcounter'

# Prefer color scheme setting.
# Available options: light | dark. Empty = follow system + show toggle.
theme_mode: dark

# The CDN endpoint for media resources.
cdn:

# the avatar on sidebar, support local or CORS resources
# TODO: When you have a real headshot, drop it at assets/img/headshot.jpg and change this to:
# avatar: /assets/img/headshot.jpg
avatar: /assets/img/avatar.svg

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
# NOTE: The SVG at this path works as a local asset, but social scrapers (Twitter/X, LinkedIn,
# Slack, iMessage) require a PNG. TODO: export og-default.svg as a 1200x630 PNG and place it at
# assets/img/og-default.png, then update this path accordingly.
social_preview_image: /assets/img/og-default.svg

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  provider: # [disqus | utterances | giscus]
  disqus:
    shortname:
  utterances:
    repo:
    issue_term:
  giscus:
    repo:
    repo_id:
    category:
    category_id:
    mapping:
    strict:
    input_position:
    lang:
    reactions_enabled:

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, keep empty means false
    env: # [development | production]

pwa:
  enabled: true # The option for PWA feature (installable)
  cache:
    enabled: true # The option for PWA offline cache
    deny_paths:
      # - "/example"

paginate: 10

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
