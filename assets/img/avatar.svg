<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 112 112" width="112" height="112" role="img" aria-label="MB monogram">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="56" cy="56" r="56" fill="url(#bg-grad)" />
  <!-- Subtle ring -->
  <circle cx="56" cy="56" r="54" fill="none" stroke="url(#text-grad)" stroke-width="1.5" opacity="0.5" />
  <!-- Monogram "MB" -->
  <text
    x="56"
    y="68"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="30"
    font-weight="700"
    letter-spacing="-1"
    text-anchor="middle"
    fill="url(#text-grad)"
  >MB</text>
</svg>
