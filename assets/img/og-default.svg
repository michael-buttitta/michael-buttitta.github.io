<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Michael Buttitta">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#1E293B" stroke-width="1" opacity="0.8" />
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#1E293B" stroke-width="1" opacity="0.8" />
  <line x1="400" y1="0" x2="400" y2="630" stroke="#1E293B" stroke-width="1" opacity="0.8" />
  <line x1="800" y1="0" x2="800" y2="630" stroke="#1E293B" stroke-width="1" opacity="0.8" />

  <!-- Accent bar -->
  <rect x="80" y="240" width="6" height="80" rx="3" fill="url(#accent)" />

  <!-- Name -->
  <text
    x="110"
    y="300"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="64"
    font-weight="800"
    letter-spacing="-2"
    fill="#F1F5F9"
  >Michael Buttitta</text>

  <!-- Domain -->
  <text
    x="110"
    y="530"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="400"
    fill="#475569"
  >michael-buttitta.github.io</text>

  <!-- MB monogram (top right) -->
  <circle cx="1100" cy="315" r="70" fill="#1E293B" />
  <circle cx="1100" cy="315" r="68" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5" />
  <text
    x="1100"
    y="335"
    font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="-1"
    text-anchor="middle"
    fill="url(#accent)"
  >MB</text>
</svg>
